services:
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: epistemic
      POSTGRES_PASSWORD: epistemic
      POSTGRES_DB: epistemic
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U epistemic"]
      interval: 5s
      timeout: 5s
      retries: 10

  grobid:
    image: lfoppiano/grobid:0.8.1
    ports:
      - "8070:8070"
    environment:
      JAVA_OPTS: "-Xmx2g"

  api:
    build:
      context: ../server
      dockerfile: Dockerfile
      args:
        BIN: epistemic-api
    env_file: ../.env
    environment:
      DATABASE_URL: postgres://epistemic:epistemic@postgres:5432/epistemic
      GROBID_URL: http://grobid:8070
      PDF_DIR: /data/pdfs
      TEI_DIR: /data/tei
      API_HOST: 0.0.0.0
      API_PORT: 8080
    volumes:
      - pdfs:/data/pdfs
      - tei:/data/tei
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "8080:8080"

  worker:
    build:
      context: ../server
      dockerfile: Dockerfile
      args:
        BIN: epistemic-worker
    env_file: ../.env
    environment:
      DATABASE_URL: postgres://epistemic:epistemic@postgres:5432/epistemic
      GROBID_URL: http://grobid:8070
      PDF_DIR: /data/pdfs
      TEI_DIR: /data/tei
    volumes:
      - pdfs:/data/pdfs
      - tei:/data/tei
    depends_on:
      postgres:
        condition: service_healthy
      grobid:
        condition: service_started

  caddy:
    image: caddy:2
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - api

volumes:
  pgdata:
  pdfs:
  tei:
  caddy_data:
  caddy_config:
